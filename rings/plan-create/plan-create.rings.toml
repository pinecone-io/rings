[workflow]
# Elects the highest-priority unblocked backlog features via a 15-agent voting
# round, then dispatches 3 core technical agents to produce an initial draft plan.
# Appends a [DRAFT] plan entry to queues/PLAN_DRAFTS.md.
#
# Run with: rings run rings/plan-create/plan-create.rings.toml
# Resume with: rings resume <run-id>

completion_signal = "PLAN_DRAFT_DONE"
completion_signal_mode = "line"
completion_signal_phases = ["draft"]
context_dir = "."
max_cycles = 1

[executor]
binary = "claude"
args = ["--dangerously-skip-permissions", "--output-format", "json", "-p", "-"]

[[phases]]
name = "elect"
prompt = "rings/plan-create/prompts/elect.md"

[[phases]]
name = "draft"
prompt = "rings/plan-create/prompts/draft.md"
