name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test --features testing

      - name: Build static release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename binary
        run: cp target/x86_64-unknown-linux-musl/release/rings rings-linux-x86_64

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "nightly (latest main)"
          prerelease: true
          files: rings-linux-x86_64
          body: |
            Auto-built from the latest commit on `main`.

            **Install:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/nightly/rings-linux-x86_64 -o rings && chmod +x rings
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
