name: Release

on:
  schedule:
    - cron: '0 * * * *'  # every hour on the hour
  workflow_dispatch:
    # Manual trigger — always runs the full build+release pipeline

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test --features testing

  # Detect whether there are unreleased code changes since the last v* tag.
  # workflow_dispatch always releases; scheduled runs only release if code changed.
  changes:
    name: Detect releasable changes
    needs: check
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so tags are available

      - name: Check for code changes since last release tag
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo '')

          if [ -z "$LATEST_TAG" ]; then
            echo "No release tag found — first release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if any non-docs files changed between last tag and HEAD
          CHANGED=$(git diff --name-only "$LATEST_TAG"..HEAD | grep -v -E '^\.(github|gitignore)|^(README|REVIEW|CLAUDE)\.md$|^docs/' || true)
          if [ -n "$CHANGED" ]; then
            echo "Code changes detected since $LATEST_TAG — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No code changes since $LATEST_TAG — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  bump:
    name: Bump patch version
    needs: changes
    if: needs.changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN — pushes with this token do NOT
          # trigger new workflow runs (GitHub's built-in loop protection)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          # Extract current version from [package] section
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Bumping ${VERSION} → ${NEW_VERSION}"

          # Update Cargo.toml (only the first version = line, which is [package])
          sed -i "0,/^version = \"${VERSION}\"/s//version = \"${NEW_VERSION}\"/" Cargo.toml

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Commit and push version bump
        id: push
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: bump
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: rings-linux-x86_64
            cross: false

          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: rings-linux-aarch64
            cross: true

          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact: rings-macos-x86_64
            cross: false

          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact: rings-macos-aarch64
            cross: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/rings ${{ matrix.artifact }}

      - name: Verify no dynamic library dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          ldd ${{ matrix.artifact }} && echo "ERROR: binary has dynamic dependencies" && exit 1 || echo "OK: not a dynamic executable"

      - name: Verify binary size (< 10 MB)
        run: |
          SIZE=$(wc -c < ${{ matrix.artifact }})
          echo "Binary size: ${SIZE} bytes ($(( SIZE / 1024 / 1024 )) MB)"
          if [ "$SIZE" -gt $((10 * 1024 * 1024)) ]; then
            echo "ERROR: binary exceeds 10 MB limit"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: [bump, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/rings-*/; do
            cp "$dir"/* release/
          done
          cd release
          sha256sum rings-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Tag release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.bump.outputs.version }}" -m "Release v${{ needs.bump.outputs.version }}"
          git push origin "v${{ needs.bump.outputs.version }}"

      - name: Delete existing nightly tag
        run: gh release delete nightly --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "v${{ needs.bump.outputs.version }} (nightly)"
          prerelease: true
          target_commitish: ${{ needs.bump.outputs.sha }}
          files: |
            release/rings-linux-x86_64
            release/rings-linux-aarch64
            release/rings-macos-x86_64
            release/rings-macos-aarch64
            release/checksums-sha256.txt
          body: |
            **v${{ needs.bump.outputs.version }}** — built from `main` (${{ needs.bump.outputs.sha }}).

            **One-line install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **Or download directly:**
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `rings-linux-x86_64` |
            | Linux ARM64 | `rings-linux-aarch64` |
            | macOS Intel | `rings-macos-x86_64` |
            | macOS Apple Silicon | `rings-macos-aarch64` |

            Verify with `checksums-sha256.txt`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
